<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
*{box-sizing:border-box}
body{margin:0;background:var(--bg);font-family:var(--font-sans);color:var(--fg1);-webkit-font-smoothing:antialiased}
.wrap{padding:22px 24px}
.row{display:flex;gap:14px;flex-wrap:wrap}
.sw{border-radius:var(--r-md);border:1px solid var(--border);overflow:hidden;background:var(--surface)}
.chip{height:64px}
.meta{font-family:var(--font-mono);font-size:11px;color:var(--fg3);padding:7px 9px;line-height:1.4}
.meta b{display:block;color:var(--fg1);font-weight:500;font-size:12px;text-transform:none}

.s{display:flex;align-items:baseline;gap:14px;margin-bottom:4px}
.s span:first-child{font-family:var(--font-mono);font-size:11px;color:var(--fg3);width:64px}

</style></head><body><div class="wrap">
<div class="s"><span>88 disp</span><span style="font-size:40px;font-weight:800;letter-spacing:-.02em">Display</span></div>
<div class="s"><span>40 4xl</span><span style="font-size:30px;font-weight:700">Heading one</span></div>
<div class="s"><span>24 2xl</span><span style="font-size:22px;font-weight:600">Card title</span></div>
<div class="s"><span>20 xl</span><span style="font-size:18px">Lead paragraph</span></div>
<div class="s"><span>16 md</span><span style="font-size:16px;color:var(--fg2)">Body copy</span></div>
<div class="s"><span>13 xs</span><span style="font-size:13px;color:var(--fg3)">Meta / caption</span></div>
</div></body></html>
