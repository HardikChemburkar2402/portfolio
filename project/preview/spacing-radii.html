<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
*{box-sizing:border-box}
body{margin:0;background:var(--bg);font-family:var(--font-sans);color:var(--fg1);-webkit-font-smoothing:antialiased}
.wrap{padding:22px 24px}
.row{display:flex;gap:16px;flex-wrap:wrap;align-items:flex-end}
.cap{font-family:var(--font-mono);font-size:11px;color:var(--fg3);margin-top:7px}

.b{width:96px;height:64px;background:var(--surface);border:1.5px solid var(--accent);}
.cell{text-align:center}

</style></head><body><div class="wrap"><div class="row">
<div class="cell"><div class="b" style="border-radius:6px"></div><div class="cap">r-xs · 6px</div></div><div class="cell"><div class="b" style="border-radius:10px"></div><div class="cap">r-sm · 10px</div></div><div class="cell"><div class="b" style="border-radius:14px"></div><div class="cap">r-md · 14px</div></div><div class="cell"><div class="b" style="border-radius:20px"></div><div class="cap">r-lg · 20px</div></div><div class="cell"><div class="b" style="border-radius:28px"></div><div class="cap">r-xl · 28px</div></div><div class="cell"><div class="b" style="border-radius:999px"></div><div class="cap">pill · pill</div></div>
</div></div></body></html>
