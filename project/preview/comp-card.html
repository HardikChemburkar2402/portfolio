<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
*{box-sizing:border-box}
body{margin:0;background:var(--bg);font-family:var(--font-sans);color:var(--fg1);-webkit-font-smoothing:antialiased}
.wrap{padding:22px 24px}
.row{display:flex;gap:16px;flex-wrap:wrap;align-items:flex-end}
.cap{font-family:var(--font-mono);font-size:11px;color:var(--fg3);margin-top:7px}

.card{width:300px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:20px;box-shadow:var(--shadow-sm);transition:var(--t-base)}
.card .yr{font-family:var(--font-mono);font-size:12px;color:var(--accent)}
.card h4{margin:8px 0 6px;font-size:18px;font-weight:700}
.card p{margin:0;font-size:14px;color:var(--fg2);line-height:1.55}
.arr{margin-top:14px;color:var(--accent);font-weight:600;font-size:13px}

</style></head><body><div class="wrap"><div class="row">
  <div class="card">
    <div class="yr">Spring 2026</div>
    <h4>DHLit Search</h4>
    <p>End-to-end NLP pipeline over 490,482 papers with BioBERT embeddings in a 10&nbsp;GB ChromaDB vector store.</p>
    <div class="arr">Open case study →</div>
  </div>
</div>
<div class="cap" style="margin-top:14px">Project card · 1px border · radius 20 · shadow-sm</div></div></body></html>
