<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
*{box-sizing:border-box}
body{margin:0;background:var(--bg);font-family:var(--font-sans);color:var(--fg1);-webkit-font-smoothing:antialiased}
.wrap{padding:22px 24px}
.row{display:flex;gap:14px;flex-wrap:wrap}
.sw{border-radius:var(--r-md);border:1px solid var(--border);overflow:hidden;background:var(--surface)}
.chip{height:64px}
.meta{font-family:var(--font-mono);font-size:11px;color:var(--fg3);padding:7px 9px;line-height:1.4}
.meta b{display:block;color:var(--fg1);font-weight:500;font-size:12px;text-transform:none}

.line{display:flex;align-items:baseline;gap:14px;margin-bottom:12px}

</style></head><body><div class="wrap">
<div class="line"><span class="ds-label">// SUMMARY</span><span class="ds-label" style="color:var(--fg3)">UPPERCASE · 0.14em</span></div>
<div class="line"><span class="ds-mono" style="font-size:28px;color:var(--accent)">01.</span><span class="ds-mono" style="font-size:28px;color:var(--accent)">02.</span><span class="ds-mono" style="font-size:28px;color:var(--accent)">03.</span><span style="color:var(--fg3);font-size:13px">section numbers</span></div>
<div class="line"><span class="ds-mono" style="font-size:24px">490,482</span><span class="ds-mono" style="font-size:24px;color:var(--positive)">35% → 82%</span><span class="ds-mono" style="font-size:24px">3.88/4.0</span></div>
<div style="color:var(--fg3);font-size:12px;font-family:var(--font-mono)">JetBrains Mono · tabular-nums for all data figures</div>
</div></body></html>
