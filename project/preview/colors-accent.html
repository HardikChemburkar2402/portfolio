<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
*{box-sizing:border-box}
body{margin:0;background:var(--bg);font-family:var(--font-sans);color:var(--fg1);-webkit-font-smoothing:antialiased}
.wrap{padding:22px 24px}
.row{display:flex;gap:14px;flex-wrap:wrap}
.sw{border-radius:var(--r-md);border:1px solid var(--border);overflow:hidden;background:var(--surface)}
.chip{height:64px}
.meta{font-family:var(--font-mono);font-size:11px;color:var(--fg3);padding:7px 9px;line-height:1.4}
.meta b{display:block;color:var(--fg1);font-weight:500;font-size:12px;text-transform:none}

.big{width:150px}.big .chip{height:90px}

</style></head><body><div class="wrap"><div class="row">
  <div class="sw big"><div class="chip" style="background:var(--accent)"></div><div class="meta"><b>Accent / blue-600</b>#2563EB</div></div>
  <div class="sw"><div class="chip" style="background:var(--accent-hover)"></div><div class="meta"><b>Hover / 700</b>#1D4ED8</div></div>
  <div class="sw"><div class="chip" style="background:var(--accent-soft)"></div><div class="meta"><b>Soft / 100</b>#DBEAFE</div></div>
  <div class="sw big"><div class="chip" style="background:var(--ink)"></div><div class="meta"><b>Ink (dock pill)</b>#0F172A</div></div>
</div></div></body></html>
