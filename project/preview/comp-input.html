<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
*{box-sizing:border-box}
body{margin:0;background:var(--bg);font-family:var(--font-sans);color:var(--fg1);-webkit-font-smoothing:antialiased}
.wrap{padding:22px 24px}
.row{display:flex;gap:16px;flex-wrap:wrap;align-items:flex-end}
.cap{font-family:var(--font-mono);font-size:11px;color:var(--fg3);margin-top:7px}

.field{display:block;max-width:340px;margin-bottom:14px}
.field label{display:block;font-family:var(--font-mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--fg3);margin-bottom:7px}
.field input{width:100%;font-family:var(--font-sans);font-size:15px;color:var(--fg1);background:var(--surface);border:1px solid var(--border-strong);border-radius:var(--r-sm);padding:11px 13px}
.field input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-tint)}

</style></head><body><div class="wrap">
<div class="field"><label>Email</label><input value="hardikchemburkar@gmail.com"></div>
<div class="field"><label>Message</label><input placeholder="Let's talk data…"></div>
<div class="cap">Input · focus = blue ring (accent-tint)</div>
</div></body></html>
