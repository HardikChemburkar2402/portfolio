<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
*{box-sizing:border-box}
body{margin:0;background:var(--bg);font-family:var(--font-sans);color:var(--fg1);-webkit-font-smoothing:antialiased}
.wrap{padding:22px 24px}
.row{display:flex;gap:16px;flex-wrap:wrap;align-items:flex-end}
.cap{font-family:var(--font-mono);font-size:11px;color:var(--fg3);margin-top:7px}

.dock{display:inline-flex;gap:4px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-pill);padding:6px;box-shadow:var(--shadow-pill)}
.dl{position:relative;padding:9px 16px;font-size:13.5px;font-weight:600;color:var(--fg2);border-radius:var(--r-pill);z-index:1}
.dl.active{color:#fff}
.pill{position:absolute;inset:0;background:var(--ink);border-radius:var(--r-pill);z-index:-1}

</style></head><body><div class="wrap"><div class="dock">
  <span class="dl active">Home<span class="pill"></span></span>
  <span class="dl">Summary</span>
  <span class="dl">Experience</span>
  <span class="dl">Skills</span>
  <span class="dl">Projects</span>
</div>
<div class="cap" style="margin-top:14px">Floating dock · dark pill glides behind active (layoutId)</div></div></body></html>
