<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
*{box-sizing:border-box}
body{margin:0;background:var(--bg);font-family:var(--font-sans);color:var(--fg1);-webkit-font-smoothing:antialiased}
.wrap{padding:22px 24px}
.row{display:flex;gap:14px;flex-wrap:wrap}
.sw{border-radius:var(--r-md);border:1px solid var(--border);overflow:hidden;background:var(--surface)}
.chip{height:64px}
.meta{font-family:var(--font-mono);font-size:11px;color:var(--fg3);padding:7px 9px;line-height:1.4}
.meta b{display:block;color:var(--fg1);font-weight:500;font-size:12px;text-transform:none}

</style></head><body><div class="wrap"><div class="row">
  <div class="sw"><div class="chip" style="background:var(--fg1)"></div><div class="meta"><b>fg1 / 900</b>#0F172A</div></div>
  <div class="sw"><div class="chip" style="background:var(--fg2)"></div><div class="meta"><b>fg2 / 600</b>#475569</div></div>
  <div class="sw"><div class="chip" style="background:var(--fg3)"></div><div class="meta"><b>fg3 / 400</b>#94A3B8</div></div>
  <div class="sw"><div class="chip" style="background:var(--border-strong)"></div><div class="meta"><b>border+</b>#CBD5E1</div></div>
  <div class="sw"><div class="chip" style="background:var(--border)"></div><div class="meta"><b>border</b>#E2E8F0</div></div>
  <div class="sw"><div class="chip" style="background:var(--surface-2)"></div><div class="meta"><b>surface-2</b>#F1F5F9</div></div>
  <div class="sw"><div class="chip" style="background:var(--bg);box-shadow:inset 0 0 0 1px var(--border)"></div><div class="meta"><b>bg / 50</b>#F8FAFC</div></div>
  <div class="sw"><div class="chip" style="background:var(--surface);box-shadow:inset 0 0 0 1px var(--border)"></div><div class="meta"><b>surface</b>#FFFFFF</div></div>
</div></div></body></html>
