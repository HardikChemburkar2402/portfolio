<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
*{box-sizing:border-box}
body{margin:0;background:var(--bg);font-family:var(--font-sans);color:var(--fg1);-webkit-font-smoothing:antialiased}
.wrap{padding:22px 24px}
.row{display:flex;gap:16px;flex-wrap:wrap;align-items:flex-end}
.cap{font-family:var(--font-mono);font-size:11px;color:var(--fg3);margin-top:7px}

.bar{height:16px;background:var(--accent);border-radius:3px}
.it{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.it .k{font-family:var(--font-mono);font-size:12px;color:var(--fg2);width:74px}

</style></head><body><div class="wrap">
<div class="it"><span class="k">sp-1</span><div class="bar" style="width:4px"></div><span style="font-family:var(--font-mono);font-size:11px;color:var(--fg3)">4px</span></div><div class="it"><span class="k">sp-2</span><div class="bar" style="width:8px"></div><span style="font-family:var(--font-mono);font-size:11px;color:var(--fg3)">8px</span></div><div class="it"><span class="k">sp-4</span><div class="bar" style="width:16px"></div><span style="font-family:var(--font-mono);font-size:11px;color:var(--fg3)">16px</span></div><div class="it"><span class="k">sp-6</span><div class="bar" style="width:24px"></div><span style="font-family:var(--font-mono);font-size:11px;color:var(--fg3)">24px</span></div><div class="it"><span class="k">sp-8</span><div class="bar" style="width:32px"></div><span style="font-family:var(--font-mono);font-size:11px;color:var(--fg3)">32px</span></div><div class="it"><span class="k">sp-12</span><div class="bar" style="width:48px"></div><span style="font-family:var(--font-mono);font-size:11px;color:var(--fg3)">48px</span></div><div class="it"><span class="k">sp-16</span><div class="bar" style="width:64px"></div><span style="font-family:var(--font-mono);font-size:11px;color:var(--fg3)">64px</span></div>
<div class="cap">4px base grid</div>
</div></body></html>
